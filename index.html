<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT Sanções ANM — Avaliação de Cenários</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F4F6F9;color:#222;font-size:14px}
.header{background:linear-gradient(135deg,#1E4E79 0%,#2E75B6 100%);color:#fff;padding:0}
.header-inner{max-width:1140px;margin:0 auto;padding:22px 28px;display:flex;align-items:center;gap:20px}

/* AJUSTE NO BADGE PARA O LOGO */
.header-badge{
  background:#fff; /* Fundo branco para o logo */
  border:1.5px solid rgba(255,255,255,.3);
  border-radius:8px;
  padding:5px;
  text-align:center;
  flex-shrink:0;
  width:70px; 
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.header-badge img{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

.header-text h1{font-size:20px;font-weight:700;line-height:1.3}
.header-text p{font-size:12px;opacity:.8;margin-top:3px}
.header-meta{margin-left:auto;text-align:right;font-size:12px;opacity:.8;flex-shrink:0;line-height:1.8}
.header-meta strong{opacity:1;font-size:13px}
.page{max-width:1140px;margin:0 auto;padding:24px 20px 60px}
.sec{margin-bottom:32px}
.sec-title{font-size:12px;font-weight:700;color:#1E4E79;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid #1E4E79;padding-bottom:5px;margin-bottom:16px}
/* Formula */
.formula-box{background:#1E4E79;color:#fff;border-radius:8px;padding:13px 20px;text-align:center;font-size:19px;font-weight:700;letter-spacing:.04em;margin-bottom:8px}
.fcard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:10px;margin-bottom:12px}
.fcard{background:#fff;border-radius:7px;padding:14px;border:.5px solid #ddd;border-top:3px solid #2E75B6}
.fcard .fc-lbl{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.fcard .fc-sym{font-size:20px;font-weight:700;color:#1E4E79;margin-bottom:3px}
.fcard .fc-desc{font-size:11px;color:#555;line-height:1.5}
.limits-row{display:flex;gap:10px;margin-top:10px}
.lcard{flex:1;background:#fff;border-radius:6px;padding:9px 13px;border:.5px solid #ddd;display:flex;justify-content:space-between;align-items:center}
.lcard .ll{font-size:11px;color:#888}.lcard .lv{font-size:13px;font-weight:700;color:#1E4E79}
.limit-note{font-size:11px;color:#999;margin-top:5px;text-align:center}
/* Charts */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.ccart{background:#fff;border-radius:8px;padding:16px;border:.5px solid #ddd}
.ccart.full{grid-column:1/-1}
.ct{font-size:13px;font-weight:700;color:#222;margin-bottom:3px}
.cs{font-size:11px;color:#999;margin-bottom:12px}
.leg{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#555}
.ll2{width:18px;height:2px;border-radius:2px;display:inline-block}
.cw{position:relative;width:100%}
.alert-info{background:#EBF5FB;border-left:3px solid #2980B9;border-radius:0 6px 6px 0;padding:9px 13px;font-size:11.5px;color:#1A5276;margin-top:8px;line-height:1.6}
/* Cliff demo */
.cliff-ctrl{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.cliff-ctrl span{font-size:12px;color:#555;font-weight:700;flex-shrink:0}
.cliff-ctrl select{padding:5px 8px;font-size:12px;border:1px solid #ccc;border-radius:5px;background:#fff}
.cliff-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cbox{border-radius:7px;padding:13px}
.cbox-a{background:#E8F4FD;border:.5px solid #B8D4EA}
.cbox-b{background:#FDEDEC;border:.5px solid #F1A9A0}
.cblbl{font-size:11px;font-weight:700;margin-bottom:7px}
.cbox-a .cblbl{color:#1A5276}.cbox-b .cblbl{color:#922B21}
.cbfine{font-size:21px;font-weight:700}
.cbox-a .cbfine{color:#1A5276}.cbox-b .cbfine{color:#C0392B}
.cbdet{font-size:11px;color:#555;margin-top:4px;line-height:1.6}
.dbar{border-radius:6px;padding:9px 13px;font-size:12px;margin-top:8px}
.dbar-bad{background:#FDEDEC;color:#922B21;border-left:3px solid #E74C3C}
.dbar-good{background:#EAFAF1;color:#1E8449;border-left:3px solid #27AE60}
/* Calculator */
.calc-wrap{background:#fff;border-radius:8px;padding:20px;border:.5px solid #ddd}

/* ─── VPM INPUT FIELD ─── */
.vpm-input-group{display:flex;align-items:stretch;gap:0;margin-bottom:4px}
.vpm-prefix{background:#1E4E79;color:#fff;border-radius:6px 0 0 6px;padding:0 12px;font-size:13px;font-weight:700;display:flex;align-items:center;flex-shrink:0}
.vpm-input{flex:1;padding:10px 12px;font-size:15px;font-weight:700;border:2px solid #1E4E79;border-left:none;border-right:none;background:#fff;color:#1E4E79;outline:none;min-width:0;text-align:right}
.vpm-input:focus{background:#EBF5FB}
.vpm-input::placeholder{font-weight:400;color:#aaa;font-size:13px}
.vpm-suffix{background:#F4F6F9;border:2px solid #1E4E79;border-left:none;border-radius:0 6px 6px 0;padding:0 10px;font-size:11px;color:#888;display:flex;align-items:center;flex-shrink:0}
.vpm-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.vpm-slider-row label{font-size:11px;color:#aaa;flex-shrink:0}
.vpm-slider-row input[type=range]{flex:1}
.vpm-hint{font-size:11px;color:#aaa;margin-bottom:14px}
.vpm-band-badge{display:inline-block;background:#EBF5FB;color:#1E4E79;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}

.ctrl-row{display:flex;align-items:center;gap:10px;margin-bottom:13px}
.ctrl-row label{font-size:12px;color:#555;min-width:145px;flex-shrink:0}
.ctrl-row input[type=range]{flex:1}
.ctrl-row .rv{font-size:12px;font-weight:700;min-width:110px;text-align:right;color:#1E4E79}
.ctrl-row select{flex:1;padding:5px 8px;font-size:12px;border:1px solid #ccc;border-radius:5px;background:#fff}
.divider{border:none;border-top:.5px solid #eee;margin:14px 0}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.metric{background:#F4F6F9;border-radius:6px;padding:9px 11px}
.metric .ml{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase}
.metric .mv{font-size:17px;font-weight:700;color:#1E4E79}
.metric .ms{font-size:10px;color:#aaa;margin-top:2px}
.result-main{background:#1E4E79;border-radius:8px;padding:15px 18px;color:#fff;margin-bottom:10px}
.rm-lbl{font-size:11px;opacity:.75;margin-bottom:3px}
.rm-val{font-size:26px;font-weight:700}
.rm-form{font-size:11px;opacity:.6;margin-top:4px}
.compare-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.ci{background:#F4F6F9;border-radius:6px;padding:10px 12px}
.ci .cil{font-size:10px;color:#888;margin-bottom:3px}
.ci .civ{font-size:16px;font-weight:700}
.badge-piso{display:inline-block;background:#FFF3CD;color:#856404;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;margin-top:5px}
.badge-teto{display:inline-block;background:#CCE5FF;color:#004085;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;margin-top:5px}
/* Danos Anexo */
.dan-list{max-height:220px;overflow-y:auto;border:1px solid #ddd;border-radius:6px;background:#fff;padding:4px 0;margin-bottom:8px}
.dan-item{display:flex;align-items:flex-start;gap:8px;padding:5px 10px;cursor:pointer;border-bottom:.5px solid #f0f0f0;transition:background .1s}
.dan-item:last-child{border-bottom:none}
.dan-item:hover{background:#EBF5FB}
.dan-item.selected{background:#D6EAF8}
.dan-item input[type=checkbox]{margin-top:2px;flex-shrink:0;cursor:pointer}
.dan-item .di-desc{font-size:11.5px;color:#333;flex:1;line-height:1.4}
.dan-item .di-fator{font-size:12px;font-weight:700;color:#1E4E79;min-width:30px;text-align:right;flex-shrink:0}
.dan-result{background:#EBF5FB;border-left:3px solid #2E75B6;border-radius:0 6px 6px 0;padding:8px 12px;font-size:12px;color:#1A5276;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
/* Desconto */
.desconto-box{background:#EAFAF1;border:1px solid #A9DFBF;border-radius:8px;padding:14px 16px;margin-top:12px}
.desconto-box .dt{font-size:12px;font-weight:700;color:#1E8449;margin-bottom:10px}
.desconto-val{font-size:22px;font-weight:700;color:#1E8449}
.desconto-econ{font-size:11px;color:#555;margin-top:3px}
/* Tables */
.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.tbl th{background:#1E4E79;color:#fff;padding:9px 11px;text-align:left;font-size:12px}
.tbl td{padding:8px 11px;border-bottom:.5px solid #eee}
.tbl tr:nth-child(even) td{background:#F8FAFC}
.tbl tr:hover td{background:#EBF3FB}
.green{color:#1E8449;font-weight:700}.red{color:#C0392B;font-weight:700}
.dp{color:#E74C3C;font-size:11px}.dn{color:#27AE60;font-size:11px}
/* Ref tables */
.ref-grid{display:grid;grid-template-columns:1fr 1fr 1.5fr;gap:14px}
/* Footer */
.footer{background:#1E4E79;color:rgba(255,255,255,.7);text-align:center;padding:14px;font-size:11px;margin-top:36px}
.footer strong{color:#fff}
@media(max-width:720px){
  .charts-grid,.cliff-grid,.compare-row,.metric-grid,.ref-grid{grid-template-columns:1fr}
  .charts-grid .ccart.full{grid-column:1}
  .header-inner{flex-direction:column;align-items:flex-start}
  .header-meta{margin-left:0}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-badge">
      <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/LogoANM.jpg" alt="Logo ANM">
    </div>
    
    <div class="header-text">
      <h1>Avaliação de Cenários — Metodologia de Cálculo de Sanções</h1>
      <p>Grupo de Trabalho de Sanções · Agência Nacional de Mineração</p>
    </div>
    <div class="header-meta">
      Mediana VPM (Média 2021–2025)<br><strong>R$ 524.475,97</strong><br>
      Referência: Res. 122/21
    </div>
  </div>
</div>

<div class="page">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// Lógica JS permanece idêntica à fornecida
</script>
</body>
</html>
